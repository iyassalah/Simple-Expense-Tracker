services:
  qashio-api:
    build: 
      context: ./qashio-api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # Reviewer-friendly defaults so `docker compose up` works without extra env setup.
    # These are not production secrets: in a real deployment, inject JWT_ACCESS_SECRET (and DB creds)
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/qashio_points
      - CORS_ORIGIN=http://localhost:4000
      - JWT_ACCESS_SECRET=dev-only-change-in-production
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES_SEC=604800
      - AUTH_REFRESH_COOKIE_NAME=refreshToken
      - COOKIE_SECURE=false
      - COOKIE_SAMESITE=lax
    command: >
      sh -c "npm run migration:run && npm run start:dev"
    networks:
      - default

  qashio-frontend:
    build: 
      context: ./qashio-frontend-assignment
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
    ports:
      - "4000:3000"
    depends_on:
      - qashio-api
    networks:
      - default

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=qashio_points
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qashio_points"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - default

volumes:
  postgres_data:

networks:
  default:
    driver: bridge 